<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hocus Pocus | Admin Login</title>
  <style>
    :root {
      --bg: #111317;
      --panel: #191d24;
      --line: #2d3748;
      --text: #eef2f8;
      --muted: #94a3b8;
      --danger: #ef7d7d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(520px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      display: grid;
      gap: 10px;
    }
    h1 { font-size: 20px; }
    p { color: var(--muted); }
    .row { display: flex; gap: 8px; }
    input, button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f141d;
      color: var(--text);
      padding: 8px 10px;
      font: inherit;
    }
    input { flex: 1; }
    button { cursor: pointer; background: #203149; }
    #status { min-height: 18px; color: var(--danger); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Admin Login</h1>
    <p>Enter `ADMIN_SECRET` to access the admin dashboard.</p>
    <div class="row">
      <input id="admin-secret" type="password" placeholder="ADMIN_SECRET" />
      <button id="login-btn">Login</button>
    </div>
    <p id="status"></p>
  </main>

  <script>
    const secretInput = document.getElementById('admin-secret');
    const statusEl = document.getElementById('status');

    async function login() {
      const secret = secretInput.value.trim();
      if (!secret) {
        statusEl.textContent = 'Enter ADMIN_SECRET';
        return;
      }

      statusEl.textContent = 'Signing in...';
      const response = await fetch('/api/admin/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret }),
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        statusEl.textContent = data.error || 'Login failed';
        return;
      }

      window.location.href = '/admin.html';
    }

    document.getElementById('login-btn').addEventListener('click', login);
    secretInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') login();
    });
  </script>
</body>
</html>
